          duration: "6 måneder",
          salary: "Lønnet",
        },
      ];

      // Load internships on page load
      function loadAllInternships(internships = allInternships) {
        const container = document.getElementById("allInternships");

        if (internships.length === 0) {
          container.innerHTML =
            '<p style="grid-column: 1 / -1; text-align: center;">Ingen praksisplasser funnet. Prøv å endre søket ditt.</p>';
          return;
        }

        container.innerHTML = internships
          .map(
            (internship) => `
                <div class="internship-card">
                    <h3>${internship.title}</h3>
                    <p class="company">🏢 ${internship.company}</p>
                    <p class="location">📍 ${internship.location}</p>
                    <p>${internship.description}</p>
                    <p style="color: #347e84; font-size: 0.9rem; margin: 0.5rem 0;"><strong>Varighet:</strong> ${internship.duration}</p>
                    <p style="color: #347e84; font-size: 0.9rem; margin: 0.5rem 0;"><strong>Status:</strong> ${internship.salary}</p>
                    <a href="apply.html" class="btn btn-primary" style="font-size: 0.9rem; padding: 8px 20px;">Søk nå</a>
                </div>
            `,
          )
          .join("");
      }

      // Search functionality
      const searchInput = document.getElementById("searchInput");
      searchInput.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = allInternships.filter(
          (internship) =>
            internship.title.toLowerCase().includes(query) ||
            internship.company.toLowerCase().includes(query) ||
            internship.location.toLowerCase().includes(query),
        );
        loadAllInternships(filtered);
      });

      // Load on page load
      document.addEventListener("DOMContentLoaded", () => {
        loadAllInternships();
      });
    </script>
  </body>
</html>
